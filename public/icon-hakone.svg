<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- 黒背景 -->
  <rect width="400" height="400" fill="#000000" rx="40"/>

  <!-- 箱（大・赤） -->
  <text
    x="200"
    y="255"
    font-family="'Hiragino Mincho ProN', 'Yu Mincho', 'MS Mincho', serif"
    font-size="270"
    font-weight="900"
    fill="#e00"
    text-anchor="middle"
    dominant-baseline="auto"
  >箱</text>

  <!-- 根（小・赤・薄め） -->
  <text
    x="200"
    y="370"
    font-family="'Hiragino Mincho ProN', 'Yu Mincho', 'MS Mincho', serif"
    font-size="72"
    font-weight="700"
    fill="#cc0000"
    text-anchor="middle"
    opacity="0.85"
    letter-spacing="8"
  >根駅伝家族</text>
</svg>
